name: Build and release Windows

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build and publish Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify update compatibility
        shell: pwsh
        run: |
          $package = Get-Content package.json -Raw | ConvertFrom-Json
          if ($package.build.appId -ne "fr.fifou.minitel-blocks-studio") {
            throw "Do not change build.appId: existing installations use this identity."
          }
          if ($package.build.nsis.guid -ne "dc16544d-96e8-5455-9e3b-cb5886d28e5f") {
            throw "The stable NSIS update GUID is missing or has changed."
          }
          if ($package.build.nsis.include -ne "build/installer.nsh" -or -not (Test-Path "build/installer.nsh")) {
            throw "The NSIS long-path update recovery script is missing."
          }
          if ($package.build.nsis.oneClick -ne $true -or $package.build.nsis.perMachine -ne $true) {
            throw "Windows updates must use the elevated one-click installer."
          }
          if ($null -ne $package.build.nsis.allowToChangeInstallationDirectory) {
            throw "A one-click update cannot allow changing the installation directory."
          }
          $mainProcess = Get-Content "electron/main.cjs" -Raw
          if (-not $mainProcess.Contains("autoUpdater.quitAndInstall(false, true);")) {
            throw "The updater must display installation progress and restart the application."
          }
          if (-not $mainProcess.Contains("autoUpdater.autoRunAppAfterInstall = true;")) {
            throw "The updater must explicitly restart the application after installation."
          }

      - name: Choose release version
        shell: pwsh
        run: |
          $package = Get-Content package.json -Raw | ConvertFrom-Json
          $parts = $package.version -split '\.'
          if ($parts.Length -lt 2) {
            throw "The package version must contain a major and minor number."
          }
          $version = "$($parts[0]).$($parts[1]).${{ github.run_number }}"
          npm version $version --no-git-tag-version
          if ($LASTEXITCODE -ne 0) {
            throw "Unable to set release version $version."
          }
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Cache embedded ESP32 engine
        uses: actions/cache@v4
        with:
          path: |
            resources/esp32-toolchain
            build/toolchain-cache
          key: esp32-engine-windows-x64-cli-1.5.1-core-3.3.8-classic-v1

      - name: Build Windows installer
        run: npm run dist:win

      - name: Verify Windows update package
        shell: pwsh
        run: |
          $metadata = Get-Content "release/latest.yml" -Raw
          if ($metadata -notmatch "(?m)^\s+isAdminRightsRequired:\s+true\s*$") {
            throw "The Windows release is missing the updater elevation marker."
          }

          $requiredFiles = @(
            "release/win-unpacked/resources/esp32/arduino-cli.exe",
            "release/win-unpacked/resources/MinitelESP32/src/MinitelESP32.cpp",
            "release/win-unpacked/resources/MinitelESP32/src/MinitelESP32.h"
          )
          foreach ($requiredFile in $requiredFiles) {
            if (-not (Test-Path $requiredFile)) {
              throw "Missing standalone ESP32 resource: $requiredFile"
            }
          }

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v5
        with:
          name: Minitel-Blocks-Studio-Windows
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
          if-no-files-found: error
          compression-level: 0

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $installer = Get-Item -Path "release/Minitel-Blocks-Studio-Setup-$env:APP_VERSION.exe"
          $blockmap = Get-Item -Path "release/Minitel-Blocks-Studio-Setup-$env:APP_VERSION.exe.blockmap"
          $latest = Get-Item -Path "release/latest.yml"
          if (-not $installer -or -not $blockmap -or -not $latest) {
            throw "One or more release files are missing."
          }

          $tag = "v$env:APP_VERSION"
          gh release view $tag --repo "${{ github.repository }}" *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $installer.FullName $blockmap.FullName $latest.FullName --clobber --repo "${{ github.repository }}"
          } else {
            gh release create $tag $installer.FullName $blockmap.FullName $latest.FullName --repo "${{ github.repository }}" --target "${{ github.sha }}" --title "Minitel Blocks Studio $tag" --generate-notes --latest
          }
          if ($LASTEXITCODE -ne 0) {
            throw "Unable to publish GitHub release $tag."
          }
